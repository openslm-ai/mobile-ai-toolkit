name: Publish to npm (with provenance)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm run build

      - name: Publish
        # Prerelease tags (e.g. v2.1.0-rc.1) ship under the `next` dist-tag so
        # default `npm install` keeps pulling the verified `latest`. Tags with
        # no hyphen (v2.0.0, v2.1.0) become `latest` automatically.
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "Publishing prerelease ${GITHUB_REF_NAME} under dist-tag 'next'"
            npm publish --provenance --access public --tag next
          else
            echo "Publishing release ${GITHUB_REF_NAME} under dist-tag 'latest'"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
