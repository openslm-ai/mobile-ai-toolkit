# Project-wide Gradle settings for AI Toolkit

# Android SDK versions (API 36 - Android 16)
AIToolkit_compileSdkVersion=36
AIToolkit_minSdkVersion=24
AIToolkit_targetSdkVersion=36

# Kotlin version
AIToolkit_kotlinVersion=1.9.20

# Enable AndroidX
android.useAndroidX=true

# Enable Jetifier
android.enableJetifier=true

# New Architecture settings
newArchEnabled=true

# Increase memory for builds
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m

# Enable parallel builds
org.gradle.parallel=true

# Enable caching
org.gradle.caching=true